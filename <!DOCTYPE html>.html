<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solitude 2026 | Interactive 3D Universe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #000b05; overflow: hidden; color: white; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; }
        
        nav { 
            position: fixed; top: 0; width: 100%; padding: 25px 5%; 
            display: flex; justify-content: space-between; z-index: 10; 
            pointer-events: none; background: linear-gradient(to bottom, rgba(0,20,10,0.8), transparent);
        }

        .instruction-badge {
            background: rgba(0, 255, 150, 0.15);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(0, 255, 150, 0.4);
            backdrop-filter: blur(10px);
            font-size: 0.75rem;
            letter-spacing: 1px;
            pointer-events: auto;
        }

        footer {
            position: fixed; bottom: 0; width: 100%; padding: 30px 0;
            background: linear-gradient(transparent, rgba(0,15,5,0.95));
            z-index: 10; text-align: center;
        }
        .social-links a { 
            color: #00ffaa; text-decoration: none; margin: 0 15px; 
            font-size: 0.8rem; font-weight: bold; transition: 0.3s; 
        }
        .social-links a:hover { color: #fff; text-shadow: 0 0 15px #00ffaa; }
        .branding { font-size: 0.9rem; margin-bottom: 8px; opacity: 0.8; letter-spacing: 2px; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 900; pointer-events: auto; letter-spacing: 3px; color: #00ffaa;">SPACE PAK</div>
    <div class="instruction-badge">DRAG TO ROTATE • SCROLL TO ZOOM • CLICK PLANETS</div>
</nav>

<div id="canvas-container"></div>

<footer>
    <div class="branding">MADE WITH SOLITUDE @2026</div>
    <div class="social-links">
        <a href="https://www.instagram.com/muneebhanif00/?hl=en" target="_blank">INSTAGRAM</a>
        <a href="https://www.facebook.com/muneebhanifdesign" target="_blank">FACEBOOK</a>
        <a href="#" target="_blank">X.COM</a>
    </div>
</footer>

<script>
    // 1. SCENE SETUP
    const scene = new THREE.Scene();
    // Greenish Nebula Background
    scene.background = new THREE.Color(0x000b05); 
    scene.fog = new THREE.FogExp2(0x001a0a, 0.002);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 5000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById("canvas-container").appendChild(renderer.domElement);

    // 2. CONTROLS (Makes the website moveable)
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    camera.position.set(0, 150, 300);

    // 3. LIGHTING (Brightened for visibility)
    const ambient = new THREE.AmbientLight(0x40ffaa, 0.6); // Green tint ambient
    scene.add(ambient);
    const sunLight = new THREE.PointLight(0xffffff, 2, 1000);
    scene.add(sunLight);

    // 4. THE SUN
    const texLoader = new THREE.TextureLoader();
    const sunGeo = new THREE.SphereGeometry(15, 64, 64);
    const sunMat = new THREE.MeshBasicMaterial({ 
        map: texLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg'), // Fallback texture
        color: 0xffaa00 
    });
    const sun = new THREE.Mesh(sunGeo, sunMat);
    scene.add(sun);

    // 5. PLANETS DATA
    const planetConfigs = [
        { name: "Mercury", size: 2.5, dist: 40, speed: 0.015, color: 0xaaaaaa },
        { name: "Venus", size: 3.8, dist: 65, speed: 0.01, color: 0xe3bb76 },
        { name: "Earth", size: 4, dist: 95, speed: 0.008, color: 0x2277ff },
        { name: "Mars", size: 3, dist: 125, speed: 0.006, color: 0xff5522 },
        { name: "Jupiter", size: 9, dist: 170, speed: 0.003, color: 0xffa500 },
        { name: "Saturn", size: 7.5, dist: 220, speed: 0.002, color: 0xdfd195, rings: true },
        { name: "Uranus", size: 5, dist: 270, speed: 0.0015, color: 0x88ffff }
    ];

    const planets = [];
    planetConfigs.forEach(conf => {
        const group = new THREE.Group();
        
        // Planet Mesh
        const mesh = new THREE.Mesh(
            new THREE.SphereGeometry(conf.size, 32, 32),
            new THREE.MeshStandardMaterial({ color: conf.color, metalness: 0.2, roughness: 0.8 })
        );
        mesh.position.x = conf.dist;
        mesh.userData = { name: conf.name };
        group.add(mesh);

        // Orbital Ring Visualizer
        const ringGeo = new THREE.RingGeometry(conf.dist - 0.5, conf.dist + 0.5, 128);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffaa, opacity: 0.1, transparent: true, side: THREE.DoubleSide });
        const orbitLine = new THREE.Mesh(ringGeo, ringMat);
        orbitLine.rotation.x = Math.PI / 2;
        scene.add(orbitLine);

        if(conf.rings) { // Saturn rings
            const sRingGeo = new THREE.RingGeometry(conf.size + 2, conf.size + 6, 64);
            const sRingMat = new THREE.MeshBasicMaterial({ color: 0x888888, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
            const sRing = new THREE.Mesh(sRingGeo, sRingMat);
            sRing.rotation.x = Math.PI/2;
            mesh.add(sRing);
        }

        scene.add(group);
        planets.push({ group, mesh, speed: conf.speed });
    });

    // 6. CUSTOM UFO SPACESHIP (Matches your image)
    const spaceship = new THREE.Group();
    
    // Glass Dome (Top)
    const dome = new THREE.Mesh(
        new THREE.SphereGeometry(2, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2),
        new THREE.MeshPhongMaterial({ color: 0x00ccff, transparent: true, opacity: 0.7, shininess: 100 })
    );
    
    // Metallic Body (Disc)
    const disc = new THREE.Mesh(
        new THREE.CylinderGeometry(5, 5, 1.5, 32),
        new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.8, roughness: 0.2 })
    );
    disc.position.y = -0.5;

    // Small Yellow Portlights
    for(let i=0; i<8; i++) {
        const light = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), new THREE.MeshBasicMaterial({color: 0xffff00}));
        const angle = (i / 8) * Math.PI * 2;
        light.position.set(Math.cos(angle)*4, -0.5, Math.sin(angle)*4);
        spaceship.add(light);
    }

    spaceship.add(dome, disc);
    scene.add(spaceship);

    // 7. CLICK TO FOCUS LOGIC
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener('click', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(planets.map(p => p.mesh));
        
        if(intersects.length > 0) {
            const target = intersects[0].object;
            const targetPos = new THREE.Vector3();
            target.getWorldPosition(targetPos);
            
            gsap.to(controls.target, { duration: 1.5, x: targetPos.x, y: targetPos.y, z: targetPos.z });
            gsap.to(camera.position, { duration: 1.5, x: targetPos.x + 20, y: targetPos.y + 10, z: targetPos.z + 30 });
        }
    });

    // 8. ANIMATION LOOP
    function animate() {
        requestAnimationFrame(animate);
        
        // Planet Orbits
        planets.forEach(p => {
            p.group.rotation.y += p.speed;
            p.mesh.rotation.y += 0.01;
        });

        // Spaceship Movement (Hovering around Earth area)
        const time = Date.now() * 0.001;
        spaceship.position.x = Math.cos(time * 0.4) * 105;
        spaceship.position.z = Math.sin(time * 0.4) * 105;
        spaceship.position.y = Math.sin(time * 2) * 2 + 5; // Bobbing up and down
        spaceship.rotation.y += 0.02; // UFO spinning

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
